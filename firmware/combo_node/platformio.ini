; SensorNet combo node — one source, two chips (ESP32 + ESP8266).
; The sensor set is chosen per-node at provisioning; the board is chosen here.
;
; Build both:   pio run
; Flash direct: pio run -e esp32dev  -t upload
;               pio run -e esp8266   -t upload
;
; Prebuilt images for the dashboard flasher (firmware/prebuilt/):
;   ESP32   — merged image @ 0x0:
;     pio run -e esp32dev
;     esptool --chip esp32 merge_bin -o ../prebuilt/combo_node.bin \
;         0x1000  .pio/build/esp32dev/bootloader.bin \
;         0x8000  .pio/build/esp32dev/partitions.bin \
;         0x10000 .pio/build/esp32dev/firmware.bin
;   ESP8266 — single image @ 0x0 (no merge needed):
;     pio run -e esp8266
;     cp .pio/build/esp8266/firmware.bin ../prebuilt/combo_node_esp8266.bin

[env]
framework = arduino
monitor_speed = 115200
lib_deps =
    https://github.com/tzapu/WiFiManager.git    ; captive-portal provisioning (fallback)
    adafruit/DHT sensor library@^1.4.6
    adafruit/Adafruit Unified Sensor@^1.1.14
    adafruit/Adafruit BMP280 Library@^2.6.8     ; BMP280 pressure (I2C)
    adafruit/Adafruit BusIO@^1.16.1
    bblanchon/ArduinoJson@^7.0.4
    ; PMS5003 is parsed inline (no extra lib)

[env:esp32dev]
platform = espressif32
board = esp32dev

[env:esp8266]
platform = espressif8266
board = nodemcuv2
board_build.filesystem = littlefs        ; config store lives on LittleFS
; SoftwareSerial + LittleFS ship with the ESP8266 core (no extra lib_deps).
