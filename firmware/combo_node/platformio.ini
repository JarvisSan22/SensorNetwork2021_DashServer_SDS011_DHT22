; SensorNet combo node — ESP32 (DHT22 + optional SDS011)
; Build:        pio run
; Flash direct: pio run -t upload
; Merged image for the server flasher (single file @ 0x0):
;   pio run
;   esptool --chip esp32 merge_bin -o ../prebuilt/combo_node.bin \
;       0x1000  .pio/build/esp32dev/bootloader.bin \
;       0x8000  .pio/build/esp32dev/partitions.bin \
;       0x10000 .pio/build/esp32dev/firmware.bin

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
    https://github.com/tzapu/WiFiManager.git    ; captive-portal provisioning (fallback)
    adafruit/DHT sensor library@^1.4.6
    adafruit/Adafruit Unified Sensor@^1.1.14
    adafruit/Adafruit BMP280 Library@^2.6.8     ; BMP280 pressure (I2C)
    adafruit/Adafruit BusIO@^1.16.1
    bblanchon/ArduinoJson@^7.0.4
    ; PMS5003 is parsed inline (no extra lib)
